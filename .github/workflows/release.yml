# Build signed installers for every platform on a version tag and publish a
# GitHub Release with a Tauri updater feed (latest.json).
#
# One-time setup before this works:
#   1. Create the GitHub repo + remote and push.
#   2. Generate a Tauri signing keypair:  npx tauri signer generate -w ~/.tauri/mdflow.key
#   3. Repo settings → Secrets → Actions:
#        TAURI_SIGNING_PRIVATE_KEY           (contents of the private key file)
#        TAURI_SIGNING_PRIVATE_KEY_PASSWORD  (password you chose, or empty)
#   4. In src-tauri/tauri.conf.json:
#        bundle.createUpdaterArtifacts = true
#        plugins.updater.pubkey        = <the public key printed by step 2>
#        plugins.updater.endpoints     = ["https://github.com/<owner>/<repo>/releases/latest/download/latest.json"]
#   5. Release by pushing a tag, e.g.:  git tag v0.2.0 && git push origin v0.2.0
#      Add a matching "## [0.2.0]" section to CHANGELOG.md for the release notes.

name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: universal-apple-darwin
            label: macos-universal
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux-x64
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target == 'universal-apple-darwin' && 'aarch64-apple-darwin,x86_64-apple-darwin' || matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - run: npm ci

      - name: Build the app
        run: npx tauri build --target ${{ matrix.target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.label }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all bundles
        uses: actions/download-artifact@v4
        with:
          path: bundles
          merge-multiple: true

      - name: Collect installers and generate latest.json
        run: |
          set -euo pipefail
          mkdir -p release-files
          version="${GITHUB_REF_NAME#v}"
          base="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}"
          date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          # Installers for humans.
          find bundles \( \
            -name '*.dmg' -o -name '*.deb' -o -name '*.rpm' \
            -o \( -name '*.AppImage' ! -name '*.sig' \) \
            -o -name '*-setup.exe' -o \( -name '*.msi' ! -name '*.sig' \) \
            \) -exec cp {} release-files/ \;

          # Updater bundles + their detached signatures.
          find bundles \( \
            -name '*.app.tar.gz' -o -name '*.app.tar.gz.sig' \
            -o -name '*.AppImage.sig' -o -name '*-setup.exe.sig' \
            \) -exec cp {} release-files/ \;

          cd release-files
          ls -la
          sig() { cat "$1" 2>/dev/null || echo ""; }
          mac_file="$(ls *.app.tar.gz 2>/dev/null | head -1 || true)"
          linux_file="$(ls *.AppImage 2>/dev/null | grep -v '\.sig$' | head -1 || true)"
          win_file="$(ls *-setup.exe 2>/dev/null | grep -v '\.sig$' | head -1 || true)"

          cat > latest.json <<JSON
          {
            "version": "${version}",
            "notes": "MDflow v${version}",
            "pub_date": "${date}",
            "platforms": {
              "darwin-aarch64": { "signature": "$(sig "${mac_file}.sig")", "url": "${base}/${mac_file}" },
              "darwin-x86_64":  { "signature": "$(sig "${mac_file}.sig")", "url": "${base}/${mac_file}" },
              "linux-x86_64":   { "signature": "$(sig "${linux_file}.sig")", "url": "${base}/${linux_file}" },
              "windows-x86_64": { "signature": "$(sig "${win_file}.sig")", "url": "${base}/${win_file}" }
            }
          }
          JSON
          echo "=== latest.json ==="
          cat latest.json

      - name: Extract release notes from CHANGELOG
        run: |
          version="${GITHUB_REF_NAME#v}"
          notes="$(awk "/^## \[?${version}\]?/{f=1;next} /^## /{if(f)exit} f" CHANGELOG.md || true)"
          if [ -z "${notes//[[:space:]]/}" ]; then
            notes="Download the installer for your platform below."
          fi
          printf '%s\n' "$notes" > release-notes.md

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "MDflow ${GITHUB_REF_NAME}" \
            --notes-file release-notes.md \
            release-files/*
