<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MDflow</title>
    <script type="module" src="/src/main.ts"></script>
  </head>

  <body class="view-split">
    <div id="app">
      <div class="workbench">
        <nav id="activitybar" aria-label="Primary">
          <button
            class="ab-btn ab-explorer active"
            id="ab-explorer"
            title="Explorer"
            type="button"
            aria-label="Toggle Explorer"
            aria-pressed="true"
          >
            ▤
          </button>
          <button
            class="ab-btn ab-settings"
            id="ab-settings"
            title="Settings"
            type="button"
            aria-label="Settings"
          >
            ⚙
          </button>
        </nav>

        <aside id="explorer" aria-label="Explorer">
          <header class="explorer-header">
            <span id="explorer-folder-name">No folder</span>
            <button id="explorer-open" class="explorer-action" title="Open Folder" type="button">
              Open
            </button>
          </header>
          <div id="explorer-tree" class="explorer-tree" role="tree"></div>
          <div id="explorer-empty" class="explorer-empty">
            <p>Open a folder to browse its files.</p>
            <button id="explorer-empty-open" type="button">Open Folder</button>
          </div>
        </aside>

        <div id="explorer-resize" class="resize-handle" aria-hidden="true"></div>

        <section id="editorarea">
          <div id="editor-header" class="editor-header">
            <div id="tabbar" class="tabbar" role="tablist" aria-label="Open files"></div>
            <div id="window-toolbar" class="window-toolbar">
              <button id="mode-editor" class="wt-btn" type="button" title="Editor (⌘E)">Editor</button>
              <button id="mode-read" class="wt-btn" type="button" title="Read (⌘P)">Read</button>
              <button id="mode-split" class="wt-btn" type="button" title="Split (⌘B)">Split</button>
              <span class="wt-sep" aria-hidden="true"></span>
              <button id="toggle-linenumbers" class="wt-btn wt-icon" type="button" title="Line numbers">#</button>
              <span class="wt-sep" aria-hidden="true"></span>
              <button id="toggle-subwindow" class="wt-btn wt-icon" type="button" title="Sub window (coming in Phase 4b)" disabled>⊞</button>
              <button id="toggle-ai" class="wt-btn wt-icon" type="button" title="AI panel (coming soon)" disabled>✦</button>
            </div>
          </div>
          <main class="panes">
            <section class="pane pane-editor" id="editor"></section>
            <div class="seam" aria-hidden="true"></div>
            <section class="pane pane-preview" id="preview"></section>
          </main>
        </section>
      </div>

      <footer class="statusbar">
        <span id="status-path" class="status-path">Untitled</span>
        <span id="status-words" class="status-words">0 words</span>
      </footer>
    </div>
  </body>
</html>
