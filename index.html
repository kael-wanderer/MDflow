<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MDflow</title>
    <script type="module" src="/src/main.ts"></script>
  </head>

  <body class="view-split">
    <div id="app">
      <div class="workbench">
        <nav id="activitybar" aria-label="Primary">
          <button
            class="ab-btn ab-explorer active"
            id="ab-explorer"
            title="Explorer"
            type="button"
            aria-label="Toggle Explorer"
            aria-pressed="true"
          ></button>
          <button
            class="ab-btn ab-search"
            id="ab-search"
            title="Search (⌘K)"
            type="button"
            aria-label="Search files and commands"
          ></button>
          <button
            class="ab-btn ab-ai"
            id="ab-ai"
            title="AI"
            type="button"
            aria-label="Toggle AI panel"
            aria-pressed="false"
          ></button>
          <button
            class="ab-btn ab-settings"
            id="ab-settings"
            title="Settings"
            type="button"
            aria-label="Open settings"
          ></button>
        </nav>

        <aside id="explorer" aria-label="Explorer">
          <header class="explorer-header">
            <span id="explorer-folder-name">No folder</span>
            <div class="explorer-actions">
              <button id="ex-new-file" class="ex-icon" type="button" title="New File"></button>
              <button id="ex-new-folder" class="ex-icon" type="button" title="New Folder"></button>
              <button id="ex-collapse" class="ex-icon" type="button" title="Collapse All"></button>
              <button id="ex-expand" class="ex-icon" type="button" title="Expand All"></button>
            </div>
          </header>
          <div id="explorer-tree" class="explorer-tree" role="tree"></div>
          <div id="explorer-empty" class="explorer-empty">
            <p>Open a folder to browse its files.</p>
            <button id="explorer-empty-open" type="button">Open Folder</button>
          </div>
        </aside>

        <div id="explorer-resize" class="resize-handle" aria-hidden="true"></div>

        <section id="editorarea">
          <div id="windows" class="windows"></div>
        </section>

        <div id="ai-resize" class="resize-handle ai-resize" aria-hidden="true"></div>
        <aside id="ai-panel" aria-label="AI">
          <div class="ai-tabs">
            <button class="ai-tab active" data-tab="chat" type="button">Chat</button>
            <button class="ai-tab" data-tab="terminal" type="button">Terminal</button>
          </div>
          <div class="ai-body"></div>
        </aside>
      </div>

    </div>
  </body>
</html>
